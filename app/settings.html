<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" href="/favicon.svg"/>
  <title>Settings — Billet</title>
  <meta name="robots" content="noindex"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles.css"/>
  <link rel="stylesheet" href="./_shared/app.css"/>
  <style>
    .set-tabs { display:flex; gap:2px; background:var(--gray-100); border-radius:var(--radius); padding:3px; margin-bottom:22px; width:fit-content; }
    .set-tab { padding:8px 18px; border:none; background:none; border-radius:8px; font-size:.82rem; font-weight:600; color:var(--gray-500); cursor:pointer; font-family:inherit; transition:all .15s; }
    .set-tab.active { background:var(--white); color:var(--gray-900); font-weight:700; box-shadow:0 1px 3px rgba(0,0,0,.08); }
    .set-card { background:var(--white); border:var(--border); border-radius:var(--radius-lg); padding:24px; max-width:720px; }
    .set-section-title { font-size:.72rem; font-weight:800; text-transform:uppercase; letter-spacing:.1em; color:var(--gray-400); margin:0 0 14px; }
    .set-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
    @media(max-width:560px){ .set-row{ grid-template-columns:1fr } }
    table.set-table { width:100%; border-collapse:collapse; }
    .set-table th { padding:9px 12px; font-size:.68rem; font-weight:800; text-transform:uppercase; letter-spacing:.07em; color:var(--gray-400); background:var(--gray-50); border-bottom:var(--border); text-align:left; }
    .set-table td { padding:11px 12px; font-size:.85rem; border-bottom:1px solid var(--gray-100); vertical-align:middle; }
    .set-table tr:last-child td { border-bottom:none; }
    .set-table input, .set-table select { padding:7px 10px; border:1.5px solid var(--gray-200); border-radius:8px; font-size:.82rem; font-family:inherit; outline:none; width:100%; box-sizing:border-box; }
    .set-table input:focus, .set-table select:focus { border-color:var(--blue-700); }
    .role-pill { display:inline-block; padding:2px 10px; border-radius:100px; font-size:.7rem; font-weight:700; background:var(--gray-100); color:var(--gray-600); text-transform:capitalize; }
    .role-pill--owner { background:var(--blue-50); color:var(--blue-700); }
    .act-btn { font-size:.75rem; font-weight:700; color:var(--blue-700); background:none; border:none; cursor:pointer; font-family:inherit; padding:0 4px; }
    .act-btn--red { color:#DC2626; }
    .act-btn:hover { text-decoration:underline; }
    .invite-link-box { display:none; margin-top:12px; padding:12px; background:var(--blue-50); border:1px solid var(--blue-100); border-radius:var(--radius); }
    .invite-link-url { font-size:.75rem; word-break:break-all; color:var(--blue-700); font-family:monospace; margin:6px 0 10px; }
    .empty-mini { padding:20px; text-align:center; color:var(--gray-400); font-size:.82rem; }
    .tabpane { display:none; } .tabpane.active { display:block; }
  </style>
</head>
<body>
<div class="app-layout">
  <nav id="app-nav"></nav>
  <main class="app-main">
    <button class="mobile-nav-btn" id="mobileNavBtn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><line x1="2" y1="4.5" x2="16" y2="4.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><line x1="2" y1="9" x2="16" y2="9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><line x1="2" y1="13.5" x2="16" y2="13.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </button>

    <div class="page-header">
      <div><h1 class="page-title">Settings</h1><p class="page-subtitle">Your shop, machines, team, and customers.</p></div>
    </div>

    <div class="set-tabs" id="setTabs">
      <button class="set-tab active" data-tab="shop">Shop</button>
      <button class="set-tab" data-tab="machines">Machines</button>
      <button class="set-tab" data-tab="team">Team</button>
      <button class="set-tab" data-tab="customers">Customers</button>
    </div>

    <!-- SHOP -->
    <section class="tabpane active" data-pane="shop">
      <div class="set-card">
        <div class="set-section-title">Shop details</div>
        <div class="set-row">
          <div><label class="form-label">Shop name</label><input class="form-input" id="shopName"/></div>
          <div><label class="form-label">Timezone</label>
            <select class="form-select" id="shopTz">
              <option value="America/Toronto">America/Toronto</option>
              <option value="America/New_York">America/New_York</option>
              <option value="America/Chicago">America/Chicago</option>
              <option value="America/Denver">America/Denver</option>
              <option value="America/Los_Angeles">America/Los_Angeles</option>
              <option value="America/Vancouver">America/Vancouver</option>
            </select>
          </div>
        </div>
        <button class="btn-app btn-app--primary" id="saveShopBtn">Save changes</button>
        <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--gray-100);font-size:.8rem;color:var(--gray-400)" id="planLine"></div>
      </div>
    </section>

    <!-- MACHINES -->
    <section class="tabpane" data-pane="machines">
      <div class="set-card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <div class="set-section-title" style="margin:0">Machines &amp; rates</div>
          <button class="btn-app btn-app--secondary btn-app--sm" id="addMachineBtn">+ Add machine</button>
        </div>
        <table class="set-table"><thead><tr><th>Name</th><th style="width:120px">Type</th><th style="width:90px">$/hr</th><th style="width:120px"></th></tr></thead>
          <tbody id="machinesTbody"><tr><td colspan="4" class="empty-mini">Loading…</td></tr></tbody>
        </table>
      </div>
    </section>

    <!-- TEAM -->
    <section class="tabpane" data-pane="team">
      <div class="set-card">
        <div class="set-section-title">Invite a teammate</div>
        <div class="set-row" style="grid-template-columns:2fr 1fr auto;align-items:end">
          <div><label class="form-label">Email</label><input class="form-input" id="invEmail" type="email" placeholder="teammate@yourshop.com"/></div>
          <div><label class="form-label">Role</label>
            <select class="form-select" id="invRole">
              <option value="operator">Operator</option>
              <option value="manager">Manager</option>
              <option value="admin">Admin</option>
              <option value="viewer">Viewer</option>
            </select>
          </div>
          <button class="btn-app btn-app--primary" id="invBtn" style="height:42px">Create invite</button>
        </div>
        <div class="invite-link-box" id="invBox">
          <div style="font-size:.78rem;font-weight:700;color:var(--blue-700)">Invite link created — share it with your teammate:</div>
          <div class="invite-link-url" id="invUrl"></div>
          <button class="btn-app btn-app--secondary btn-app--sm" id="invCopyBtn">Copy link</button>
        </div>

        <div class="set-section-title" style="margin-top:26px">Team members</div>
        <table class="set-table"><thead><tr><th>Name</th><th>Role</th><th style="width:140px"></th></tr></thead>
          <tbody id="teamTbody"><tr><td colspan="3" class="empty-mini">Loading…</td></tr></tbody>
        </table>

        <div class="set-section-title" style="margin-top:26px">Pending invites</div>
        <table class="set-table"><thead><tr><th>Email</th><th>Role</th><th style="width:170px"></th></tr></thead>
          <tbody id="invitesTbody"><tr><td colspan="3" class="empty-mini">None</td></tr></tbody>
        </table>
      </div>
    </section>

    <!-- CUSTOMERS -->
    <section class="tabpane" data-pane="customers">
      <div class="set-card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <div class="set-section-title" style="margin:0">Customers</div>
          <button class="btn-app btn-app--secondary btn-app--sm" id="addCustBtn">+ Add customer</button>
        </div>
        <table class="set-table"><thead><tr><th>Company</th><th>Contact</th><th>Email</th><th style="width:70px">Jobs</th><th style="width:120px"></th></tr></thead>
          <tbody id="custTbody"><tr><td colspan="5" class="empty-mini">Loading…</td></tr></tbody>
        </table>
      </div>
    </section>
  </main>
</div>

<!-- Customer modal -->
<div class="modal-backdrop" id="custModal" style="display:none">
  <div class="modal">
    <div class="modal-header"><div class="modal-title" id="custModalTitle">Add Customer</div><button class="modal-close" id="closeCust">x</button></div>
    <div class="modal-body">
      <form id="custForm" novalidate>
        <input type="hidden" id="cId"/>
        <div class="form-row"><label class="form-label">Company name *</label><input class="form-input" id="cName" required/></div>
        <div class="form-row-2">
          <div class="form-row"><label class="form-label">Contact name</label><input class="form-input" id="cContact"/></div>
          <div class="form-row"><label class="form-label">Phone</label><input class="form-input" id="cPhone"/></div>
        </div>
        <div class="form-row"><label class="form-label">Email</label><input class="form-input" type="email" id="cEmail"/></div>
        <div class="form-row"><label class="form-label">Notes</label><textarea class="form-textarea" id="cNotes" rows="2"></textarea></div>
        <div id="custError" style="display:none;margin-top:8px;padding:10px;background:#FFF1F2;border:1px solid #FECACA;border-radius:var(--radius);font-size:.82rem;color:#DC2626"></div>
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px">
          <button type="button" class="btn-app btn-app--secondary" id="cancelCust">Cancel</button>
          <button type="submit" class="btn-app btn-app--primary" id="saveCustBtn">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script type="module" src="./settings.js"></script>
</body>
</html>
