<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  
  <link rel="icon" href="/favicon.svg"/>
<title>Job Status — Billet</title>
  <meta name="robots" content="noindex"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; }
    :root {
      --blue:#1D4ED8; --green:#16A34A; --amber:#D97706; --red:#DC2626;
      --gray-50:#F9FAFB; --gray-100:#F3F4F6; --gray-200:#E5E7EB;
      --gray-400:#9CA3AF; --gray-500:#6B7280; --gray-700:#374151; --gray-900:#111827;
    }
    body {
      font-family: Inter, sans-serif;
      background: var(--gray-50);
      margin: 0; min-height: 100vh;
      display: flex; flex-direction: column;
    }
    header {
      background: var(--gray-900); color: white;
      padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display:flex; align-items:center; gap:8px; font-weight:900; font-size:.95rem; }
    .logo svg { flex-shrink:0; }
    .powered { font-size:.68rem; color:rgba(255,255,255,.35); }

    main { flex:1; padding:20px; max-width:480px; margin:0 auto; width:100%; }

    /* Job info card */
    .job-card {
      background:white; border:1px solid var(--gray-200);
      border-radius:16px; padding:20px;
      margin-bottom:16px;
      box-shadow:0 1px 3px rgba(0,0,0,.07);
    }
    .job-number { font-size:.75rem; font-weight:800; text-transform:uppercase; letter-spacing:.1em; color:var(--blue); margin-bottom:4px; }
    .job-part { font-size:1.4rem; font-weight:900; color:var(--gray-900); letter-spacing:-.03em; margin-bottom:8px; line-height:1.2; }
    .job-meta { font-size:.875rem; color:var(--gray-500); line-height:1.7; }
    .job-meta strong { color:var(--gray-700); }
    .priority-rush { display:inline-block; background:#FFF1F2; color:var(--red); border:1px solid #FECACA; font-size:.7rem; font-weight:800; text-transform:uppercase; letter-spacing:.08em; padding:3px 10px; border-radius:100px; margin-bottom:10px; }

    /* Operation card */
    .op-card {
      background:white; border:1px solid var(--gray-200);
      border-radius:16px; padding:20px;
      margin-bottom:20px;
    }
    .op-label { font-size:.7rem; font-weight:800; text-transform:uppercase; letter-spacing:.12em; color:var(--gray-400); margin-bottom:6px; }
    .op-name { font-size:1.1rem; font-weight:800; color:var(--gray-900); margin-bottom:12px; }
    .op-machine { display:flex; align-items:center; gap:7px; font-size:.875rem; color:var(--gray-500); margin-bottom:4px; }
    .op-hours { font-size:.82rem; color:var(--gray-400); }

    /* Status display */
    .status-display {
      display:flex; align-items:center; gap:10px;
      padding:14px 16px; border-radius:12px;
      margin-bottom:20px;
      font-size:1rem; font-weight:800; letter-spacing:.02em;
    }
    .status-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .status--queue   { background:var(--gray-100); color:var(--gray-600); }
    .status--queue .status-dot { background:var(--gray-400); }
    .status--setup   { background:#FFF7ED; color:#C2410C; }
    .status--setup .status-dot { background:#C2410C; }
    .status--running { background:#EFF6FF; color:var(--blue); }
    .status--running .status-dot { background:var(--blue); animation:pulse 1.5s infinite; }
    .status--paused  { background:#FFFBEB; color:var(--amber); }
    .status--paused .status-dot { background:var(--amber); }
    .status--complete { background:#F0FDF4; color:var(--green); }
    .status--complete .status-dot { background:var(--green); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* Action buttons */
    .actions { display:flex; flex-direction:column; gap:12px; }
    .action-btn {
      width:100%; padding:20px 16px;
      border-radius:14px; border:none; cursor:pointer;
      font-size:1.1rem; font-weight:800;
      font-family:inherit; letter-spacing:-.01em;
      transition:all .15s ease;
      display:flex; align-items:center; justify-content:center; gap:10px;
    }
    .action-btn:active { transform:scale(.97); }
    .action-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
    .btn-start    { background:var(--blue); color:white; }
    .btn-start:not(:disabled):hover { background:#1e40af; }
    .btn-pause    { background:#FFFBEB; color:var(--amber); border:2px solid #FDE68A; }
    .btn-pause:not(:disabled):hover { background:#FDE68A; }
    .btn-resume   { background:#EFF6FF; color:var(--blue); border:2px solid #DBEAFE; }
    .btn-resume:not(:disabled):hover { background:#DBEAFE; }
    .btn-complete { background:var(--green); color:white; }
    .btn-complete:not(:disabled):hover { background:#15803d; }

    /* Steps progress */
    .steps-card { background:white; border:1px solid var(--gray-200); border-radius:16px; padding:16px; margin-top:16px; }
    .steps-title { font-size:.7rem; font-weight:800; text-transform:uppercase; letter-spacing:.12em; color:var(--gray-400); margin-bottom:12px; }
    .step-row { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--gray-100); font-size:.875rem; }
    .step-row:last-child { border-bottom:none; }
    .step-num { width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.7rem; font-weight:800; flex-shrink:0; }
    .step-num--done    { background:#F0FDF4; color:var(--green); }
    .step-num--current { background:#EFF6FF; color:var(--blue); }
    .step-num--pending { background:var(--gray-100); color:var(--gray-400); }
    .step-info { flex:1; }
    .step-op { font-weight:600; color:var(--gray-900); }
    .step-mach { font-size:.75rem; color:var(--gray-400); }
    .step-done-tag { font-size:.68rem; font-weight:700; color:var(--green); background:#F0FDF4; border:1px solid #BBF7D0; padding:2px 8px; border-radius:100px; }

    /* Loading / error */
    .center-msg { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:300px; text-align:center; color:var(--gray-400); gap:14px; }
    .spinner { width:32px; height:32px; border:3px solid var(--gray-200); border-top-color:var(--blue); border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg) } }

    /* Confirm complete overlay */
    .confirm-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:100;
      display:none; align-items:center; justify-content:center; padding:20px;
    }
    .confirm-box { background:white; border-radius:20px; padding:28px; max-width:360px; width:100%; text-align:center; }
    .confirm-box h3 { font-size:1.2rem; font-weight:800; color:var(--gray-900); margin:0 0 10px; }
    .confirm-box p { font-size:.9rem; color:var(--gray-500); margin:0 0 24px; }
    .confirm-btns { display:flex; gap:10px; }
    .confirm-btns button { flex:1; padding:14px; border-radius:10px; border:none; font-size:.95rem; font-weight:700; cursor:pointer; font-family:inherit; }
    .confirm-cancel { background:var(--gray-100); color:var(--gray-700); }
    .confirm-ok { background:var(--green); color:white; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 28 28" fill="none">
      <circle cx="14" cy="14" r="3" fill="#1D4ED8"/>
      <circle cx="4" cy="8" r="2" fill="#1D4ED8" opacity=".5"/>
      <circle cx="24" cy="8" r="2" fill="#1D4ED8" opacity=".5"/>
      <circle cx="4" cy="20" r="2" fill="#1D4ED8" opacity=".5"/>
      <circle cx="24" cy="20" r="2" fill="#1D4ED8" opacity=".5"/>
      <line x1="14" y1="11" x2="5.2" y2="9.2" stroke="#1D4ED8" stroke-width="1.2" opacity=".6"/>
      <line x1="14" y1="11" x2="22.8" y2="9.2" stroke="#1D4ED8" stroke-width="1.2" opacity=".6"/>
      <line x1="14" y1="17" x2="5.2" y2="18.8" stroke="#1D4ED8" stroke-width="1.2" opacity=".6"/>
      <line x1="14" y1="17" x2="22.8" y2="18.8" stroke="#1D4ED8" stroke-width="1.2" opacity=".6"/>
    </svg>
    Billet
  </div>
  <span class="powered">Shop Floor</span>
</header>

<main id="mainContent">
  <div class="center-msg"><div class="spinner"></div><div>Loading job…</div></div>
</main>

<!-- Confirm complete dialog -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3>Mark as Complete?</h3>
    <p>This will mark the operation as complete and notify your shop manager.</p>
    <div class="confirm-btns">
      <button class="confirm-cancel" id="confirmCancel">Cancel</button>
      <button class="confirm-ok" id="confirmOk">Yes, Complete</button>
    </div>
  </div>
</div>

<script>
const token = new URLSearchParams(location.search).get('token')
const main  = document.getElementById('mainContent')

let currentData = null

if (!token) {
  showError('Invalid QR code. No job token found.')
} else {
  loadJob()
}

async function loadJob() {
  try {
    const res  = await fetch(`/api/operator?token=${encodeURIComponent(token)}`)
    const data = await res.json()
    if (!res.ok) return showError(data.error || 'Job not found.')
    currentData = data
    render(data)
  } catch (e) {
    showError('Failed to load job. Check your connection and try again.')
  }
}

function render({ job, current_entry, all_steps, traveler }) {
  const statusLabels = { queue:'In Queue', setup:'Setup in Progress', running:'Running', paused:'Paused', complete:'Complete' }
  const status = current_entry?.status || 'queue'
  const statusLabel = statusLabels[status] || status

  const priorityHtml = job.priority === 'rush' ? `<div class="priority-rush">⚡ RUSH JOB</div>` : ''
  const dueHtml = job.due_date
    ? `<div><strong>Due:</strong> ${fmtDate(job.due_date)}</div>`
    : ''

  main.innerHTML = `
    <div class="job-card">
      ${priorityHtml}
      <div class="job-number">${esc(job.job_number)}</div>
      <div class="job-part">${esc(job.part_name)}</div>
      <div class="job-meta">
        ${job.customer ? `<div><strong>Customer:</strong> ${esc(job.customer)}</div>` : ''}
        <div><strong>Qty:</strong> ${job.quantity}${job.material ? ` &nbsp;·&nbsp; <strong>Material:</strong> ${esc(job.material)}` : ''}</div>
        ${job.revision ? `<div><strong>Rev:</strong> ${esc(job.revision)}</div>` : ''}
        ${dueHtml}
        ${job.notes ? `<div style="margin-top:6px;padding:8px 10px;background:var(--gray-50);border-radius:8px;font-size:.82rem">${esc(job.notes)}</div>` : ''}
      </div>
    </div>

    ${current_entry ? `
      <div class="op-card">
        <div class="op-label">Current Operation</div>
        <div class="op-name">${esc(current_entry.operation)}</div>
        ${current_entry.machine ? `
          <div class="op-machine">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="2" width="12" height="10" rx="1.2" stroke="currentColor" stroke-width="1.1"/><path d="M4 1v2M10 1v2M1 6h12" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>
            ${esc(current_entry.machine)}
          </div>` : ''}
        ${current_entry.est_hours ? `<div class="op-hours">Est. ${current_entry.est_hours} hrs</div>` : ''}
      </div>
    ` : ''}

    <div class="status-display status--${status}">
      <div class="status-dot"></div>
      ${statusLabel}
    </div>

    <div class="actions" id="actionBtns">
      ${getActionBtns(status)}
    </div>

    ${all_steps && all_steps.length > 1 ? `
      <div class="steps-card">
        <div class="steps-title">Operations</div>
        ${all_steps.map((s, i) => {
          const isDone    = s.status === 'complete'
          const isCurrent = s.status !== 'complete' && all_steps.slice(0, i).every(p => p.status === 'complete')
          return `
            <div class="step-row">
              <div class="step-num step-num--${isDone ? 'done' : isCurrent ? 'current' : 'pending'}">
                ${isDone ? '✓' : s.op_sequence}
              </div>
              <div class="step-info">
                <div class="step-op">${esc(s.operation)}</div>
                ${s.machine ? `<div class="step-mach">${esc(s.machine)}</div>` : ''}
              </div>
              ${isDone ? `<div class="step-done-tag">Done</div>` : ''}
            </div>`
        }).join('')}
      </div>
    ` : ''}

    ${traveler && traveler.total > 0 ? `
      <div class="steps-card" style="margin-top:12px">
        <div class="steps-title">Work Order — ${traveler.done}/${traveler.total} steps complete</div>
        <div style="height:4px;background:#E5E7EB;border-radius:2px;overflow:hidden;margin-bottom:12px">
          <div style="height:100%;width:${Math.round(traveler.done/traveler.total*100)}%;background:${traveler.done===traveler.total?'#16A34A':'#1D4ED8'};border-radius:2px;transition:width .3s"></div>
        </div>
        ${traveler.current_step ? `
          <div style="background:#EFF6FF;border:1px solid #DBEAFE;border-radius:10px;padding:14px;margin-bottom:12px">
            <div style="font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#1D4ED8;margin-bottom:4px">Current Step ${traveler.current_step.step_number}</div>
            <div style="font-size:1rem;font-weight:800;color:#111827;margin-bottom:6px">${esc(traveler.current_step.title)}</div>
            ${traveler.current_step.instructions ? `<div style="font-size:.82rem;color:#4B5563;line-height:1.6">${esc(traveler.current_step.instructions)}</div>` : ''}
            ${traveler.current_step.requires_dimension ? `
              <div style="margin-top:10px">
                <label style="font-size:.72rem;font-weight:700;color:#1D4ED8;display:block;margin-bottom:4px">${esc(traveler.current_step.dimension_label || 'Dimension')} (${esc(traveler.current_step.dimension_unit || 'in')})</label>
                <input id="dimInput" type="text" inputmode="decimal" placeholder="Enter measured value" style="width:100%;padding:10px 14px;border:1.5px solid #DBEAFE;border-radius:8px;font-size:1rem;font-family:inherit;outline:none;box-sizing:border-box"/>
              </div>
            ` : ''}
            <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
              <button class="action-btn btn-complete" style="flex:1;padding:14px;font-size:.9rem" onclick="completeStep('${traveler.current_step.id}', ${traveler.current_step.requires_dimension})">
                ✓ Complete Step
              </button>
              <button onclick="flagStep('${traveler.current_step.id}')" style="padding:14px 16px;border-radius:12px;border:2px solid #FECACA;background:#FFF1F2;color:#DC2626;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit">
                Flag Issue
              </button>
            </div>
          </div>
        ` : ''}
        ${traveler.steps.map(s => {
          const cls = s.status === 'complete' ? 'done' : s.status === 'flagged' ? 'current' : 'pending'
          return `<div class="step-row">
            <div class="step-num step-num--${cls}">${s.status==='complete'?'✓':s.status==='flagged'?'!':s.step_number}</div>
            <div class="step-info">
              <div class="step-op">${esc(s.title)}</div>
              ${s.dimension_value ? `<div class="step-mach">${esc(s.dimension_label||'Dim')}: ${esc(s.dimension_value)} ${esc(s.dimension_unit||'')}</div>` : ''}
              ${s.flag_note ? `<div class="step-mach" style="color:#DC2626">⚠ ${esc(s.flag_note)}</div>` : ''}
            </div>
            ${s.status==='complete'?`<div class="step-done-tag">Done</div>`:''}
          </div>`
        }).join('')}
      </div>
    ` : ''}
  `

  attachActionListeners()
}

function getActionBtns(status) {
  if (status === 'complete') {
    return `<div style="text-align:center;padding:20px;color:var(--green);font-weight:800;font-size:1rem">✓ Operation Complete</div>`
  }

  const btns = []
  if (status === 'queue' || status === 'setup') {
    btns.push(`<button class="action-btn btn-start" data-action="start">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><polygon points="6,4 16,10 6,16" fill="white"/></svg>
      Start Operation
    </button>`)
  }
  if (status === 'running') {
    btns.push(`<button class="action-btn btn-pause" data-action="pause">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="5" y="4" width="3" height="12" rx="1" fill="currentColor"/><rect x="12" y="4" width="3" height="12" rx="1" fill="currentColor"/></svg>
      Pause
    </button>`)
    btns.push(`<button class="action-btn btn-complete" data-action="complete">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><polyline points="4,10 8,14 16,6" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Mark Complete
    </button>`)
  }
  if (status === 'paused') {
    btns.push(`<button class="action-btn btn-resume" data-action="start">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><polygon points="6,4 16,10 6,16" fill="currentColor"/></svg>
      Resume
    </button>`)
    btns.push(`<button class="action-btn btn-complete" data-action="complete">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><polyline points="4,10 8,14 16,6" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Mark Complete
    </button>`)
  }
  return btns.join('')
}

function attachActionListeners() {
  document.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', () => {
      const action = btn.dataset.action
      if (action === 'complete') {
        document.getElementById('confirmOverlay').style.display = 'flex'
        document.getElementById('confirmOk').onclick = () => doAction('complete')
        document.getElementById('confirmCancel').onclick = () => { document.getElementById('confirmOverlay').style.display = 'none' }
      } else {
        doAction(action)
      }
    })
  })
}

async function completeStep(stepId, requiresDim) {
  let dimValue = null
  if (requiresDim) {
    dimValue = document.getElementById('dimInput')?.value?.trim()
    if (!dimValue) { alert('Please enter the measured dimension before completing.'); return }
  }
  try {
    const res = await fetch(`/api/operator?token=${encodeURIComponent(token)}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'complete_step', step_id: stepId, dimension_value: dimValue }),
    })
    if (!res.ok) { const d = await res.json(); throw new Error(d.error) }
    await loadJob()
  } catch (e) { alert('Failed: ' + e.message) }
}

async function flagStep(stepId) {
  const note = prompt('Describe the issue:')
  if (!note) return
  try {
    const res = await fetch(`/api/operator?token=${encodeURIComponent(token)}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'complete_step', step_id: stepId, flag: true, flag_note: note }),
    })
    if (!res.ok) { const d = await res.json(); throw new Error(d.error) }
    await loadJob()
  } catch (e) { alert('Failed: ' + e.message) }
}

async function doAction(action) {
  document.getElementById('confirmOverlay').style.display = 'none'
  document.querySelectorAll('[data-action]').forEach(b => b.disabled = true)

  try {
    const res  = await fetch(`/api/operator?token=${encodeURIComponent(token)}`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ action }),
    })
    const data = await res.json()
    if (!res.ok) throw new Error(data.error || 'Update failed')

    // Re-load to get fresh state
    await loadJob()
  } catch (e) {
    alert('Failed to update: ' + e.message)
    document.querySelectorAll('[data-action]').forEach(b => b.disabled = false)
  }
}

function showError(msg) {
  main.innerHTML = `
    <div class="center-msg">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none" style="color:#D1D5DB">
        <circle cx="24" cy="24" r="22" stroke="currentColor" stroke-width="2"/>
        <path d="M24 14v12M24 32v3" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <div style="font-weight:700;color:#374151;font-size:1rem">${esc(msg)}</div>
      <div style="font-size:.82rem">Scan the QR code again or contact your supervisor.</div>
    </div>`
}

function fmtDate(d) {
  if (!d) return ''
  const dt = new Date(d + 'T00:00:00')
  return dt.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' })
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}
</script>
</body>
</html>
