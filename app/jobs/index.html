<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <link rel="icon" href="/favicon.svg"/>
<title>All Jobs — Billet</title>
  <meta name="robots" content="noindex"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../../styles.css"/>
  <link rel="stylesheet" href="../_shared/app.css"/>
  <style>
    .jobs-topbar { display:flex; align-items:center; gap:12px; margin-bottom:18px; flex-wrap:wrap; }
    .jobs-search { flex:1; min-width:200px; padding:9px 14px; border:1.5px solid var(--gray-200); border-radius:var(--radius); font-size:.875rem; font-family:inherit; outline:none; }
    .jobs-search:focus { border-color:var(--blue-700); }
    .status-tabs { display:flex; gap:2px; background:var(--gray-100); border-radius:var(--radius); padding:3px; }
    .status-tab { padding:6px 14px; border:none; background:none; border-radius:8px; font-size:.78rem; font-weight:600; color:var(--gray-500); cursor:pointer; transition:all .15s; font-family:inherit; }
    .status-tab.active { background:var(--white); color:var(--gray-900); font-weight:700; box-shadow:0 1px 3px rgba(0,0,0,.08); }

    .jobs-table-wrap { background:var(--white); border:var(--border); border-radius:var(--radius-lg); overflow:hidden; }
    table { width:100%; border-collapse:collapse; }
    th { padding:10px 16px; font-size:.7rem; font-weight:800; text-transform:uppercase; letter-spacing:.08em; color:var(--gray-400); background:var(--gray-50); border-bottom:var(--border); text-align:left; }
    td { padding:12px 16px; font-size:.875rem; border-bottom:1px solid var(--gray-100); vertical-align:middle; }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:#fafafa; cursor:pointer; }
    .job-num { font-weight:800; color:var(--gray-900); }
    .job-part { color:var(--gray-600); }
    .due-late { color:#DC2626; font-weight:700; }
  </style>
</head>
<body>
<div class="app-layout">
  <nav id="app-nav"></nav>
  <main class="app-main">
    <button class="mobile-nav-btn" id="mobileNavBtn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><line x1="2" y1="4.5" x2="16" y2="4.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><line x1="2" y1="9" x2="16" y2="9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><line x1="2" y1="13.5" x2="16" y2="13.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </button>

    <div class="page-header">
      <div><h1 class="page-title">All Jobs</h1></div>
      <a href="/app/modules/production-board/" class="btn-app btn-app--primary btn-app--sm">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M4 7h6M7 4v6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        Open Board
      </a>
    </div>

    <div class="jobs-topbar">
      <input class="jobs-search" type="search" id="jobSearch" placeholder="Search job number, part, or customer…"/>
      <div class="status-tabs" id="statusTabs">
        <button class="status-tab active" data-status="all">All</button>
        <button class="status-tab" data-status="open">Open</button>
        <button class="status-tab" data-status="in_progress">In Progress</button>
        <button class="status-tab" data-status="complete">Complete</button>
        <button class="status-tab" data-status="shipped">Shipped</button>
      </div>
    </div>

    <div class="jobs-table-wrap">
      <table id="jobsTable">
        <thead>
          <tr>
            <th>Job #</th>
            <th>Part Name</th>
            <th>Customer</th>
            <th>Qty</th>
            <th>Priority</th>
            <th>Status</th>
            <th>Due Date</th>
          </tr>
        </thead>
        <tbody id="jobsTbody">
          <tr><td colspan="7" style="text-align:center;color:var(--gray-400);padding:32px">
            <div class="spinner" style="margin:0 auto 10px"></div>Loading…
          </td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>
<script type="module" src="./index.js"></script>
</body>
</html>
