<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <link rel="icon" href="/favicon.svg"/>
<title>Job Detail — Billet</title>
  <meta name="robots" content="noindex"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../../styles.css"/>
  <link rel="stylesheet" href="../_shared/app.css"/>
  <style>
    .job-detail-grid { display:grid; grid-template-columns:1fr 340px; gap:20px; align-items:start; }
    .job-info-card { background:var(--white); border:var(--border); border-radius:var(--radius-lg); padding:24px; margin-bottom:20px; }
    .job-info-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; margin-top:16px; }
    .ji-field label { font-size:.65rem; font-weight:800; text-transform:uppercase; letter-spacing:.08em; color:var(--gray-400); display:block; margin-bottom:4px; }
    .ji-field span  { font-size:.9rem; font-weight:600; color:var(--gray-800); }

    /* Cost summary sidebar */
    .cost-summary { background:var(--white); border:var(--border); border-radius:var(--radius-lg); padding:22px; position:sticky; top:20px; }
    .cs-title { font-size:.78rem; font-weight:800; text-transform:uppercase; letter-spacing:.1em; color:var(--gray-400); margin-bottom:16px; }
    .cs-row { display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid var(--gray-100); font-size:.875rem; }
    .cs-row:last-child { border-bottom:none; }
    .cs-row-label { color:var(--gray-600); }
    .cs-row-val { font-weight:700; color:var(--gray-900); font-variant-numeric:tabular-nums; }
    .cs-total { font-size:1rem; font-weight:900; }
    .cs-margin { margin-top:16px; padding:14px; border-radius:var(--radius); text-align:center; }
    .cs-margin--green { background:#F0FDF4; }
    .cs-margin--amber { background:#FFFBEB; }
    .cs-margin--red   { background:#FFF1F2; }
    .cs-margin-pct { font-size:2rem; font-weight:900; letter-spacing:-.04em; line-height:1; }
    .cs-margin--green .cs-margin-pct { color:#15803D; }
    .cs-margin--amber .cs-margin-pct { color:#D97706; }
    .cs-margin--red   .cs-margin-pct { color:#DC2626; }
    .cs-margin-label { font-size:.72rem; font-weight:700; color:var(--gray-400); margin-top:4px; }
    .cs-target { font-size:.75rem; color:var(--gray-400); margin-top:6px; text-align:center; }

    /* Cost entries table */
    .entries-card { background:var(--white); border:var(--border); border-radius:var(--radius-lg); overflow:hidden; }
    .entries-header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:var(--border); }
    .entries-title  { font-size:.9rem; font-weight:800; color:var(--gray-900); }
    table.costs { width:100%; border-collapse:collapse; }
    table.costs th { padding:9px 16px; font-size:.68rem; font-weight:800; text-transform:uppercase; letter-spacing:.08em; color:var(--gray-400); background:var(--gray-50); border-bottom:var(--border); text-align:left; }
    table.costs td { padding:11px 16px; font-size:.875rem; border-bottom:1px solid var(--gray-100); vertical-align:middle; }
    table.costs tr:last-child td { border-bottom:none; }
    table.costs .num { text-align:right; font-variant-numeric:tabular-nums; }
    .type-pill { padding:2px 9px; border-radius:100px; font-size:.65rem; font-weight:800; text-transform:uppercase; letter-spacing:.06em; }
    .type-labor    { background:#EFF6FF; color:var(--blue-700); }
    .type-material { background:#F0FDF4; color:#15803D; }
    .type-outside  { background:#FFFBEB; color:#D97706; }
    .type-overhead { background:var(--gray-100); color:var(--gray-600); }
    .type-other    { background:var(--gray-100); color:var(--gray-500); }
    .auto-badge { font-size:.62rem; color:var(--gray-300); font-style:italic; margin-left:4px; }
    .del-btn { color:var(--gray-300); background:none; border:none; cursor:pointer; font-size:.9rem; padding:2px 6px; border-radius:4px; }
    .del-btn:hover { color:#DC2626; background:#FFF1F2; }

    /* Add cost form */
    .add-cost-section { padding:16px 20px; border-top:var(--border); background:var(--gray-50); }
    .add-cost-title { font-size:.75rem; font-weight:800; text-transform:uppercase; letter-spacing:.1em; color:var(--gray-400); margin-bottom:12px; }
    .add-cost-grid { display:grid; grid-template-columns:120px 1fr 100px 100px auto; gap:8px; align-items:end; }

    @media(max-width:960px) { .job-detail-grid { grid-template-columns:1fr } .cost-summary { position:static } }
    @media(max-width:600px) { .job-info-grid { grid-template-columns:1fr 1fr } .add-cost-grid { grid-template-columns:1fr 1fr } }
  </style>
</head>
<body>
<div class="app-layout">
  <nav id="app-nav"></nav>
  <main class="app-main">
    <button class="mobile-nav-btn" id="mobileNavBtn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><line x1="2" y1="4.5" x2="16" y2="4.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><line x1="2" y1="9" x2="16" y2="9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><line x1="2" y1="13.5" x2="16" y2="13.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </button>

    <div style="margin-bottom:16px">
      <a href="/app/modules/job-costing/" style="display:inline-flex;align-items:center;gap:6px;font-size:.82rem;color:var(--gray-400);font-weight:600;text-decoration:none">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 3L5 7l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Job Costing
      </a>
    </div>

    <div id="pageContent">
      <div class="page-loading"><div class="spinner"></div> Loading job...</div>
    </div>
  </main>
</div>
<script type="module" src="./detail.js"></script>
</body>
</html>
