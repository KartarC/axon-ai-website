<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <link rel="icon" href="/favicon.svg"/>
<title>Sign In — Billet</title>
  <meta name="robots" content="noindex"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles.css"/>
  <link rel="stylesheet" href="./_shared/app.css"/>
  <style>
    body { background:var(--gray-50); display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .login-wrap { width:100%; max-width:400px; padding:24px; }
    .login-logo { display:flex; align-items:center; gap:9px; justify-content:center; margin-bottom:32px; text-decoration:none; }
    .login-logo-text { font-size:1.1rem; font-weight:900; color:var(--gray-900); letter-spacing:-.02em; }
    .login-card { background:var(--white); border:var(--border); border-radius:var(--radius-xl); padding:32px; box-shadow:var(--shadow); }
    .login-title { font-size:1.3rem; font-weight:800; color:var(--gray-900); margin:0 0 6px; letter-spacing:-.03em; }
    .login-sub { font-size:.875rem; color:var(--gray-500); margin:0 0 24px; }
    .login-field { margin-bottom:16px; }
    .login-label { display:block; font-size:.78rem; font-weight:700; color:var(--gray-700); margin-bottom:6px; }
    .login-input {
      width:100%; box-sizing:border-box; padding:11px 14px;
      border:1.5px solid var(--gray-200); border-radius:var(--radius);
      font-size:.9rem; font-family:inherit; color:var(--gray-900);
      outline:none; transition:border-color var(--t);
    }
    .login-input:focus { border-color:var(--blue-700); box-shadow:0 0 0 3px rgba(29,78,216,.1); }
    .login-btn {
      width:100%; padding:13px; margin-top:8px;
      background:var(--gray-900); color:var(--white);
      border:none; border-radius:var(--radius);
      font-size:.95rem; font-weight:700; cursor:pointer;
      font-family:inherit; transition:all var(--t);
      display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .login-btn:hover:not(:disabled) { background:var(--gray-700); }
    .login-btn:disabled { opacity:.6; cursor:not-allowed; }
    .login-error {
      margin-top:14px; padding:10px 14px;
      background:#FFF1F2; border:1px solid #FECACA; border-radius:var(--radius);
      font-size:.82rem; color:#DC2626; display:none;
    }
    .login-footer { text-align:center; margin-top:20px; font-size:.8rem; color:var(--gray-400); }
    .login-footer a { color:var(--blue-700); }
  </style>
</head>
<body>
<div class="login-wrap">
  <a href="/" class="login-logo">
    <svg width="30" height="30" viewBox="0 0 28 28" fill="none" aria-hidden="true">
      <rect x="2" y="2" width="24" height="24" rx="7" fill="#1F2937"/>
      <rect x="18" y="4" width="5.5" height="5.5" rx="1.4" fill="#F59E0B"/>
      <text x="14" y="20" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="800" fill="#FAFAF9" text-anchor="middle">B</text>
    </svg>
    <span class="login-logo-text">Billet</span>
  </a>

  <div class="login-card">
    <h1 class="login-title">Sign in to your shop</h1>
    <p class="login-sub">Enter the email and password you set when you accepted your invite.</p>

    <form id="loginForm" novalidate>
      <div class="login-field">
        <label class="login-label" for="email">Work email</label>
        <input class="login-input" type="email" id="email" name="email" autocomplete="email" placeholder="you@yourshop.com" required/>
      </div>
      <div class="login-field">
        <label class="login-label" for="password">Password</label>
        <input class="login-input" type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required/>
      </div>
      <button class="login-btn" type="submit" id="submitBtn">
        Sign In
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7h10M8 4l3 3-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="login-error" id="loginError"></div>
    </form>
  </div>

  <div class="login-footer">
    New to Billet? <a href="/app/signup.html">Start a free trial</a>
  </div>
</div>

<script type="module" src="./login.js"></script>
</body>
</html>
