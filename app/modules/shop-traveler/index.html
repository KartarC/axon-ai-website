<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shop Traveler — Axon AI</title>
  <meta name="robots" content="noindex"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../../../styles.css"/>
  <link rel="stylesheet" href="../../_shared/app.css"/>
  <style>
    .traveler-layout { display:grid; grid-template-columns:320px 1fr; gap:20px; align-items:start; }
    @media(max-width:900px){ .traveler-layout { grid-template-columns:1fr } }

    /* Job list panel */
    .job-list-panel { background:var(--white); border:var(--border); border-radius:var(--radius-lg); overflow:hidden; }
    .panel-header { padding:14px 18px; border-bottom:var(--border); display:flex; align-items:center; justify-content:space-between; }
    .panel-title  { font-size:.82rem; font-weight:800; text-transform:uppercase; letter-spacing:.1em; color:var(--gray-400); }
    .job-list-search { width:100%; padding:10px 14px; border:none; border-bottom:var(--border); font-size:.875rem; font-family:inherit; outline:none; background:var(--gray-50); }
    .job-list-search:focus { background:var(--white); }
    .job-list-items { max-height:calc(100vh - 240px); overflow-y:auto; }
    .job-list-item {
      padding:12px 18px; border-bottom:1px solid var(--gray-100); cursor:pointer;
      transition:background .12s; display:flex; align-items:center; gap:12px;
    }
    .job-list-item:last-child { border-bottom:none; }
    .job-list-item:hover { background:var(--gray-50); }
    .job-list-item.active { background:var(--blue-50); border-left:3px solid var(--blue-700); }
    .jli-info { flex:1; min-width:0; }
    .jli-num  { font-size:.82rem; font-weight:800; color:var(--gray-900); }
    .jli-part { font-size:.75rem; color:var(--gray-500); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .jli-progress { flex-shrink:0; text-align:right; }
    .jli-frac { font-size:.75rem; font-weight:700; color:var(--gray-500); }
    .progress-bar { width:48px; height:4px; background:var(--gray-200); border-radius:2px; overflow:hidden; margin-top:4px; }
    .progress-fill { height:100%; border-radius:2px; background:var(--blue-700); transition:width .3s; }
    .progress-fill--done { background:#16A34A; }
    .jli-flag { width:8px; height:8px; border-radius:50%; background:#DC2626; flex-shrink:0; }
    .no-traveler-dot { width:8px; height:8px; border-radius:50%; background:var(--gray-200); flex-shrink:0; }

    /* Steps panel */
    .steps-panel { background:var(--white); border:var(--border); border-radius:var(--radius-lg); overflow:hidden; }
    .steps-header { padding:16px 20px; border-bottom:var(--border); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
    .steps-job-title { font-size:1rem; font-weight:800; color:var(--gray-900); }
    .steps-job-sub   { font-size:.78rem; color:var(--gray-500); margin-top:2px; }
    .steps-actions   { display:flex; gap:8px; flex-wrap:wrap; }

    /* Step rows */
    .step-list { padding:8px 0; }
    .step-row {
      display:flex; align-items:flex-start; gap:14px;
      padding:14px 20px; border-bottom:1px solid var(--gray-100);
      transition:background .12s;
    }
    .step-row:last-child { border-bottom:none; }
    .step-row:hover { background:var(--gray-50); }
    .step-row--flagged { background:#FFF9F9; }
    .step-row--complete { opacity:.7; }

    .step-num {
      width:28px; height:28px; border-radius:50%; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-size:.75rem; font-weight:800;
    }
    .step-num--pending   { background:var(--gray-100); color:var(--gray-400); }
    .step-num--in_progress { background:var(--blue-50); color:var(--blue-700); border:1px solid var(--blue-100); }
    .step-num--complete  { background:#F0FDF4; color:#16A34A; border:1px solid #BBF7D0; }
    .step-num--flagged   { background:#FFF1F2; color:#DC2626; border:1px solid #FECACA; }

    .step-body { flex:1; min-width:0; }
    .step-title { font-size:.9rem; font-weight:700; color:var(--gray-900); margin-bottom:3px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .step-instructions { font-size:.8rem; color:var(--gray-500); line-height:1.6; margin-bottom:6px; }
    .step-dim { display:inline-flex; align-items:center; gap:6px; font-size:.78rem; padding:3px 10px; background:var(--blue-50); border:1px solid var(--blue-100); border-radius:100px; color:var(--blue-700); font-weight:600; margin-bottom:6px; }
    .step-flag-note { font-size:.78rem; color:#DC2626; background:#FFF1F2; border:1px solid #FECACA; border-radius:var(--radius); padding:6px 10px; margin-top:6px; }
    .step-done-info { font-size:.72rem; color:var(--gray-400); margin-top:4px; }

    .step-actions { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
    .step-btn {
      padding:4px 12px; border-radius:6px; border:1.5px solid var(--gray-200);
      font-size:.72rem; font-weight:700; cursor:pointer;
      background:var(--white); color:var(--gray-600); font-family:inherit; transition:all .15s;
    }
    .step-btn:hover { border-color:var(--blue-700); color:var(--blue-700); background:var(--blue-50); }
    .step-btn--complete:hover { border-color:#16A34A; color:#16A34A; background:#F0FDF4; }
    .step-btn--flag:hover { border-color:#DC2626; color:#DC2626; background:#FFF1F2; }
    .step-btn--del:hover { border-color:#DC2626; color:#DC2626; background:#FFF1F2; }

    /* Add step form */
    .add-step-section { padding:16px 20px; border-top:var(--border); background:var(--gray-50); }
    .add-step-title { font-size:.7rem; font-weight:800; text-transform:uppercase; letter-spacing:.1em; color:var(--gray-400); margin-bottom:10px; }

    /* Template modal */
    #templateModal, #addStepModal, #flagModal { display:none; }
  </style>
</head>
<body>
<div class="app-layout">
  <nav id="app-nav"></nav>
  <main class="app-main">
    <button class="mobile-nav-btn" id="mobileNavBtn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><line x1="2" y1="4.5" x2="16" y2="4.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><line x1="2" y1="9" x2="16" y2="9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><line x1="2" y1="13.5" x2="16" y2="13.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </button>

    <div class="page-header">
      <div><h1 class="page-title">Shop Traveler</h1><p class="page-subtitle">Step-by-step work orders for every job. Paperless, with full audit trail.</p></div>
      <button class="btn-app btn-app--secondary btn-app--sm" id="manageTemplatesBtn">Manage Templates</button>
    </div>

    <div class="traveler-layout">
      <!-- Job list -->
      <div class="job-list-panel">
        <div class="panel-header">
          <div class="panel-title">Jobs</div>
          <div id="jobCountBadge" style="font-size:.72rem;color:var(--gray-400)"></div>
        </div>
        <input class="job-list-search" type="search" id="jobSearch" placeholder="Search jobs..."/>
        <div class="job-list-items" id="jobListItems">
          <div style="padding:32px;text-align:center;color:var(--gray-400)"><div class="spinner" style="margin:0 auto 10px"></div>Loading...</div>
        </div>
      </div>

      <!-- Steps panel -->
      <div class="steps-panel" id="stepsPanel">
        <div style="display:flex;align-items:center;justify-content:center;min-height:300px;color:var(--gray-300);flex-direction:column;gap:10px">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none"><rect x="8" y="4" width="24" height="32" rx="3" stroke="currentColor" stroke-width="1.5"/><path d="M14 14h12M14 20h8M14 26h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <div style="font-size:.875rem">Select a job to view its traveler</div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Apply Template Modal -->
<div class="modal-backdrop" id="templateModal">
  <div class="modal">
    <div class="modal-header"><div class="modal-title">Apply Template</div><button class="modal-close" id="closeTmpl">x</button></div>
    <div class="modal-body">
      <p id="tmplJobLabel" style="font-size:.875rem;color:var(--gray-500);margin:0 0 16px"></p>
      <div id="tmplList" style="display:flex;flex-direction:column;gap:8px;max-height:300px;overflow-y:auto"></div>
      <div style="margin-top:14px;display:flex;justify-content:flex-end">
        <button class="btn-app btn-app--secondary" id="cancelTmpl">Cancel</button>
      </div>
    </div>
  </div>
</div>

<!-- Add Step Modal -->
<div class="modal-backdrop" id="addStepModal">
  <div class="modal">
    <div class="modal-header"><div class="modal-title">Add Step</div><button class="modal-close" id="closeAddStep">x</button></div>
    <div class="modal-body">
      <form id="addStepForm" novalidate>
        <input type="hidden" id="asJobId"/>
        <div class="form-row"><label class="form-label">Step Title *</label><input class="form-input" id="asTitle" placeholder="e.g. CNC Milling" required/></div>
        <div class="form-row"><label class="form-label">Instructions</label><textarea class="form-textarea" id="asInstructions" rows="3" placeholder="Operator instructions, tolerances, program numbers..."></textarea></div>
        <div class="form-row" style="display:flex;align-items:center;gap:10px">
          <input type="checkbox" id="asReqDim" style="width:16px;height:16px;accent-color:var(--blue-700)"/>
          <label class="form-label" style="margin:0;cursor:pointer" for="asReqDim">Requires dimension recording</label>
        </div>
        <div id="asDimFields" style="display:none">
          <div class="form-row-2">
            <div class="form-row"><label class="form-label">Dimension Label</label><input class="form-input" id="asDimLabel" placeholder="e.g. Bore ID"/></div>
            <div class="form-row"><label class="form-label">Unit</label><select class="form-select" id="asDimUnit"><option value="in">in</option><option value="mm">mm</option><option value="deg">deg</option><option value="other">other</option></select></div>
          </div>
        </div>
        <div id="addStepError" style="display:none;margin-top:10px;padding:10px;background:#FFF1F2;border:1px solid #FECACA;border-radius:var(--radius);font-size:.82rem;color:#DC2626"></div>
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px">
          <button type="button" class="btn-app btn-app--secondary" id="cancelAddStep">Cancel</button>
          <button type="submit" class="btn-app btn-app--primary" id="saveStepBtn">Add Step</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Flag Step Modal -->
<div class="modal-backdrop" id="flagModal">
  <div class="modal">
    <div class="modal-header"><div class="modal-title">Flag Issue</div><button class="modal-close" id="closeFlagModal">x</button></div>
    <div class="modal-body">
      <p style="font-size:.875rem;color:var(--gray-500);margin:0 0 14px" id="flagStepLabel"></p>
      <div class="form-row"><label class="form-label">Describe the issue *</label><textarea class="form-textarea" id="flagNoteInput" rows="3" placeholder="What went wrong? What action was taken?"></textarea></div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px">
        <button class="btn-app btn-app--secondary" id="cancelFlag">Cancel</button>
        <button class="btn-app" style="background:#DC2626;color:white" id="submitFlag">Flag This Step</button>
      </div>
    </div>
  </div>
</div>

<script type="module" src="./index.js"></script>
</body>
</html>
