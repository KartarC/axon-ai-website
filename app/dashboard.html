<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <link rel="icon" href="/favicon.svg"/>
<title>Dashboard — Billet</title>
  <meta name="robots" content="noindex"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles.css"/>
  <link rel="stylesheet" href="./_shared/app.css"/>
  <style>
    .dash-greeting { font-size:clamp(1.3rem,2.5vw,1.8rem); font-weight:900; color:var(--gray-900); letter-spacing:-.04em; margin-bottom:4px; }
    .dash-sub { font-size:.9rem; color:var(--gray-500); margin-bottom:28px; }
    .modules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:16px; }
    .module-tile {
      background:var(--white); border:var(--border); border-radius:var(--radius-xl);
      padding:22px; text-decoration:none;
      transition:all var(--t); display:flex; flex-direction:column; gap:12px;
      position:relative; overflow:hidden;
    }
    .module-tile:hover { border-color:var(--blue-700); box-shadow:0 0 0 3px rgba(29,78,216,.08), var(--shadow); transform:translateY(-2px); }
    .module-tile-icon {
      width:44px; height:44px; border-radius:var(--radius-lg);
      background:var(--blue-50); border:1px solid var(--blue-100);
      display:flex; align-items:center; justify-content:center;
      color:var(--blue-700);
    }
    .module-tile-name { font-size:1rem; font-weight:800; color:var(--gray-900); }
    .module-tile-desc { font-size:.82rem; color:var(--gray-500); line-height:1.55; flex:1; }
    .module-tile-roi {
      font-size:.72rem; font-weight:700; color:var(--blue-700);
      background:var(--blue-50); border:1px solid var(--blue-100);
      padding:3px 10px; border-radius:100px; width:fit-content;
    }
    .module-tile-arrow {
      position:absolute; top:18px; right:18px;
      color:var(--gray-300); transition:color var(--t), transform var(--t);
    }
    .module-tile:hover .module-tile-arrow { color:var(--blue-700); transform:translateX(3px); }

    /* Phase 2+ module teaser (locked) */
    .module-tile--locked { opacity:.65; cursor:not-allowed; background:var(--gray-50); }
    .module-tile--locked:hover { transform:none; box-shadow:none; border-color:var(--gray-200); }
    .lock-badge {
      display:inline-flex; align-items:center; gap:5px;
      font-size:.68rem; font-weight:700; color:var(--gray-500);
      background:var(--gray-100); border:1px solid var(--gray-200);
      padding:3px 9px; border-radius:100px; width:fit-content;
    }

    .dash-section-label {
      font-size:.72rem; font-weight:800; text-transform:uppercase;
      letter-spacing:.12em; color:var(--gray-400); margin:28px 0 14px;
    }
  </style>
</head>
<body>
<div class="app-layout">
  <nav id="app-nav"></nav>
  <main class="app-main">
    <button class="mobile-nav-btn" id="mobileNavBtn" aria-label="Open menu">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><line x1="2" y1="4.5" x2="16" y2="4.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><line x1="2" y1="9" x2="16" y2="9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><line x1="2" y1="13.5" x2="16" y2="13.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </button>

    <div id="dashContent">
      <div class="page-loading"><div class="spinner"></div> Loading…</div>
    </div>
  </main>
</div>

<script type="module" src="./dashboard.js"></script>
</body>
</html>
